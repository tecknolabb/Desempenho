
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tecknolab · Painel Analítico</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #0b0c16; font-family: 'JetBrains Mono', 'Courier New', monospace; color: #fff; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0f1021; }
    ::-webkit-scrollbar-thumb { background: #1f2244; border-radius: 3px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fadeInUp { animation: fadeInUp 0.45s ease both; }
    
    .grid-bg {
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.015) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    select option { background: #131528; }
    .pulse-cyan:hover { box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">
      <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#00d4ff,#d946ef);display:flex;align-items:center;justify-content:center;font-size:22px;">⚡</div>
      <p style="color:#475569;font-family:monospace;font-size:12px;letter-spacing:0.1em;">TECKNOLAB · CARREGANDO INTERFACE ANALÍTICA...</p>
    </div>
  </div>

<script>
  window.addEventListener('load', function() {
    if (!window.React || !window.Recharts) {
      document.getElementById('root').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0b0c16;color:#ef4444;font-family:monospace;">
          <div style="background:#131528;padding:30px;border:1px solid #ef444455;border-radius:12px;max-width:500px;">
            <h2 style="font-size:16px;margin-bottom:10px;">⚠️ Falha de Conexão</h2>
            <p style="font-size:12px;color:#94a3b8;line-height:1.5;">O navegador não conseguiu baixar as bibliotecas visuais (React). Verifique sua conexão com a internet ou se o seu antivírus está bloqueando scripts locais.</p>
          </div>
        </div>`;
    }
  });
  window.addEventListener('error', function(e) {
    console.error("Erro detectado:", e.message);
  });
</script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback, useEffect } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

// Configuração da Planilha
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwLwzmvOTNKI9DiQbAMtWF03ArjgbOl4dEdr1-iU68Mhd9liDuUSN39dclBHtFXjaW15g/exec";

const COL_MAP = {
  date:                ["data", "date", "data da atividade", "dt"],
  collaborator:        ["colaborador", "colaboradora", "nome", "funcionário", "funcionario"],
  department:          ["departamento", "setor", "área", "area", "dept"],
  action:              ["ação", "acao", "atividade", "tarefa", "descrição", "descricao"],
  duration:            ["duração", "duracao", "horas", "tempo", "duration", "h"],
  status:              ["status", "situação", "situacao", "estado"],
  type:                ["tipo", "type", "categoria", "category"],
  trainingResponsible: ["responsável pelo treinamento", "responsavel pelo treinamento", "instrutor", "instructor"],
};

// Cores
const DEPT_COLORS  = { "Lab. Elétrica":"#00d4ff", "Lab. Manutenção":"#d946ef", "Administrativo":"#8b5cf6", "Atividade Externa":"#3b82f6" };
const TYPE_COLORS  = { "Tarefa":"#00d4ff", "Treinamento":"#d946ef", "Curso":"#ec4899" };
const STATUS_CFG   = {
  "Concluído": { bg:"rgba(16,185,129,.15)", border:"rgba(16,185,129,.4)", text:"#10b981", dot:"#10b981" },
  "Pendente":  { bg:"rgba(239,68,68,.15)",  border:"rgba(239,68,68,.4)",  text:"#ef4444", dot:"#ef4444" },
};

// Dados de Backup caso a planilha falhe
const MOCK_DATA = [
  { id:1, date:"2026-05-06", collaborator:"Cátia", department:"Administrativo", action:"Tarefa administrativa", duration:8, status:"Concluído", type:"Tarefa", trainingResponsible:null },
  { id:2, date:"2026-05-07", collaborator:"Cátia", department:"Administrativo", action:"Fechamento de chamados", duration:4, status:"Pendente", type:"Tarefa", trainingResponsible:null },
  { id:3, date:"2026-04-01", collaborator:"Pedro", department:"Lab. Manutenção", action:"Treinamento de calibração", duration:2, status:"Concluído", type:"Treinamento", trainingResponsible:"Prof. Roberto Alves" },
  { id:4, date:"2026-05-10", collaborator:"Marina Costa", department:"Lab. Elétrica", action:"Calibração Instrumentos", duration:11, status:"Concluído", type:"Tarefa", trainingResponsible:null },
];

// Parser CSV
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const parseRow = (line) => {
    const result = []; let current = ''; let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') inQuotes = !inQuotes;
      else if (line[i] === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
      else current += line[i];
    }
    result.push(current.trim()); return result;
  };
  const headers = parseRow(lines[0]).map(h => h.toLowerCase().replace(/['"]/g, '').trim());
  const resolve = (aliases) => {
    for (const alias of aliases) {
      const idx = headers.findIndex(h => h === alias || h.includes(alias));
      if (idx !== -1) return idx;
    }
    return -1;
  };
  const idx = {};
  for (const [key, aliases] of Object.entries(COL_MAP)) idx[key] = resolve(aliases);
  
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = parseRow(lines[i]);
    const get = (key, fallback = "") => idx[key] !== -1 ? (cols[idx[key]] || fallback) : fallback;
    const dur = parseFloat(get("duration", "0").replace(",", ".")) || 0;
    rows.push({
      id: i,
      date: get("date", ""),
      collaborator: get("collaborator", "—"),
      department: get("department", "—"),
      action: get("action", "—"),
      duration: dur,
      status: get("status", "—"),
      type: get("type", "Tarefa"),
      trainingResponsible: get("trainingResponsible") || null,
    });
  }
  return rows;
}

// COMPONENTES DA INTERFACE
function StatusBadge({ status }) {
  const cfg = STATUS_CFG[status] || { bg:"rgba(100,116,139,.15)", border:"rgba(100,116,139,.3)", text:"#64748b", dot:"#64748b" };
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", gap:6, padding:"3px 10px",
      borderRadius:99, fontSize:10, fontWeight:700, letterSpacing:"0.05em",
      background: cfg.bg, border:`1px solid ${cfg.border}`, color: cfg.text
    }}>
      <span style={{ width:6, height:6, borderRadius:"50%", background: cfg.dot, display:"inline-block" }}></span>
      {status}
    </span>
  );
}

function KpiCard({ icon, label, value, unit = "", subtext = "", accentColor = "#00d4ff" }) {
  return (
    <div className="fadeInUp" style={{ background: "#131528", border: `1px solid ${accentColor}22`, boxShadow: `0 4px 20px ${accentColor}05`, borderRadius: 12, padding: "20px", position: "relative" }}>
      <div style={{ position:"absolute", top:15, right:15, fontSize:18, opacity:0.6 }}>{icon}</div>
      <p style={{ color:"#64748b", fontSize:11, fontWeight:700, textTransform:"uppercase", marginBottom:6 }}>{label}</p>
      <p style={{ color:"#fff", fontSize:28, fontWeight:900, lineHeight:1 }}>
        {value} <span style={{ color:"#475569", fontSize:16, marginLeft:4 }}>{unit}</span>
      </p>
      {subtext && <p style={{ color:"#475569", fontSize:11, marginTop:6 }}>{subtext}</p>}
    </div>
  );
}

function SelectFilter({ label, options, value, onChange }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
      <label style={{ fontSize:10, color:"#475569", textTransform:"uppercase", fontWeight:700 }}>{label}</label>
      <select value={value} onChange={e => onChange(e.target.value)} style={{ background:"#1a1d36", border:"1px solid #2d3154", color:"#94a3b8", fontSize:11, padding: "8px 14px", borderRadius:8, outline:"none", cursor:"pointer", fontFamily:"inherit", minWidth: 140 }}>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

// DASHBOARD PRINCIPAL
function TecklabDashboard() {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(false);
  const [usingMock, setUsingMock] = useState(false);

  const [fPeriod, setFPeriod] = useState("Todos");
  const [fDept, setFDept] = useState("Geral");
  const [fCollab, setFCollab] = useState("Todos");

  const fetchData = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch(SHEET_URL + "?t=" + Date.now());
      if (!res.ok) throw new Error();
      const text = await res.text();
      const parsed = parseCSV(text);
      if (parsed.length === 0) throw new Error();
      setData(parsed);
      setUsingMock(false);
    } catch {
      setData(MOCK_DATA);
      setUsingMock(true);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchData(); }, [fetchData]);

  const periods = ["Todos", "Hoje", "Últimos 7 dias", "Este Mês"];
  const depts = useMemo(() => ["Geral", ...new Set(data.map(d => d.department).filter(Boolean))], [data]);
  const collabs = useMemo(() => ["Todos", ...new Set(data.map(d => d.collaborator).filter(Boolean))], [data]);

  const filtered = useMemo(() => {
    return data.filter(a => {
      if (fDept !== "Geral" && a.department !== fDept) return false;
      if (fCollab !== "Todos" && a.collaborator !== fCollab) return false;
      if (fPeriod !== "Todos" && a.date) {
        let itemDate;
        if (a.date.includes("/")) {
          const parts = a.date.split("/");
          itemDate = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
        } else {
          itemDate = new Date(a.date + "T00:00:00");
        }
        const today = new Date();
        today.setHours(0,0,0,0);
        itemDate.setHours(0,0,0,0);

        if (fPeriod === "Hoje" && itemDate.getTime() !== today.getTime()) return false;
        if (fPeriod === "Últimos 7 dias") {
          const diff = (today - itemDate) / (1000 * 60 * 60 * 24);
          if (diff > 7 || diff < 0) return false;
        }
        if (fPeriod === "Este Mês" && (itemDate.getMonth() !== today.getMonth() || itemDate.getFullYear() !== today.getFullYear())) return false;
      }
      return true;
    });
  }, [data, fPeriod, fDept, fCollab]);

  const totalHoursFormatted = useMemo(() => {
    const mins = filtered.reduce((acc, curr) => acc + (curr.duration * 60), 0);
    const hrs = Math.floor(mins / 60);
    const remMins = Math.round(mins % 60);
    return `${String(hrs).padStart(2, '0')}:${String(remMins).padStart(2, '0')}`;
  }, [filtered]);

  const efficiency = useMemo(() => {
    const done = filtered.filter(a => a.status === "Concluído").length;
    return filtered.length ? Math.round((done / filtered.length) * 100) : 0;
  }, [filtered]);

  const pendingCount = useMemo(() => filtered.filter(a => a.status === "Pendente").length, [filtered]);
  const qualifications = useMemo(() => filtered.filter(a => a.type === "Treinamento" || a.type === "Curso").length, [filtered]);

  const deptData = useMemo(() => {
    const m = {};
    filtered.forEach(a => { m[a.department] = (m[a.department] || 0) + a.duration; });
    return Object.entries(m).map(([name, value]) => ({ name, value }));
  }, [filtered]);

  const typeData = useMemo(() => {
    const m = {};
    filtered.forEach(a => { m[a.type] = (m[a.type] || 0) + a.duration; });
    return Object.entries(m).map(([name, value]) => ({ name, value }));
  }, [filtered]);

  const topInstructors = useMemo(() => {
    const m = {};
    data.filter(a => a.trainingResponsible).forEach(a => { m[a.trainingResponsible] = (m[a.trainingResponsible] || 0) + 1; });
    return Object.entries(m).map(([name, count]) => ({ name, count })).sort((a,b) => b.count - a.count).slice(0, 4);
  }, [data]);

  return (
    <div className="grid-bg" style={{ minHeight:"100vh", paddingBottom:60 }}>
      <header style={{ background: "#111224", borderBottom: "1px solid #1f2244", padding: "20px 0", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 1400, margin: "0 auto", padding: "0 24px", display: "flex", flexWrap: "wrap", justifyContent: "space-between", alignItems: "center", gap: 20 }}>
          <div>
            <h1 style={{ fontSize: 22, fontWeight: 900, color: "#fff", letterSpacing: "0.05em", display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ color: "#00d4ff" }}>⚡</span> TECKNOLAB
            </h1>
            <p style={{ color: "#64748b", fontSize: 10, letterSpacing: "0.15em", marginTop: 2 }}>SERVIÇOS DE TESTE E MEDIÇÃO</p>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 16, alignItems: "flex-end" }}>
            <SelectFilter label="Período" options={periods} value={fPeriod} onChange={setFPeriod} />
            <SelectFilter label="Visão" options={depts} value={fDept} onChange={setFDept} />
            <SelectFilter label="Filtrar por Técnico" options={collabs} value={fCollab} onChange={setFCollab} />
            <button onClick={fetchData} disabled={loading} className="pulse-cyan" style={{ background: "linear-gradient(135deg, #00d4ff22, #d946ef22)", border: "1px solid #2d3154", color: "#00d4ff", fontSize: 11, fontWeight: 700, padding: "9px 16px", borderRadius: 8, cursor: "pointer", transition: "all 0.3s" }}>
              {loading ? "Buscando..." : "Atualizar Dados"}
            </button>
          </div>
        </div>
      </header>

      <main style={{ maxWidth: 1400, margin: "30px auto 0 auto", padding: "0 24px", display: "flex", flexDirection: "column", gap: 30 }}>
        {usingMock && (
          <div style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", color: "#ef4444", padding: "10px 16px", borderRadius: 8, fontSize: 12, fontWeight: 700 }}>
            ⚠️ AVISO: Não foi possível carregar a planilha. Exibindo dados de demonstração.
          </div>
        )}

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 20 }}>
          <KpiCard icon="🕒" label="TOTAL DE HORAS" value={totalHoursFormatted} subtext="Soma da duração filtrada" accentColor="#00d4ff" />
          <KpiCard icon="📈" label="EFICIÊNCIA GERAL" value={efficiency} unit="%" subtext="Status Concluído / Total" accentColor="#d946ef" />
          <KpiCard icon="⚠️" label="TAREFAS PENDENTES" value={pendingCount} subtext="Registros não concluídos" accentColor="#ef4444" />
          <KpiCard icon="🎓" label="QUALIFICAÇÕES" value={qualifications} subtext="Ações de Treinamento" accentColor="#8b5cf6" />
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(500px, 1fr))", gap: 20 }}>
          <div style={{ background: "#131528", border: "1px solid #1f2244", borderRadius: 12, padding: 24 }}>
            <h3 style={{ fontSize: 12, fontWeight: 800, color: "#fff", marginBottom: 20, letterSpacing: "0.05em" }}>CARGA POR DEPARTAMENTO</h3>
            <div style={{ width: "100%", height: 260 }}>
              <ResponsiveContainer>
                <BarChart data={deptData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1f2244" vertical={false} />
                  <XAxis dataKey="name" stroke="#475569" fontSize={10} tickLine={false} />
                  <YAxis stroke="#475569" fontSize={10} tickLine={false} />
                  <Tooltip contentStyle={{ background:"#1c1e36", border:"1px solid #2d3154", borderRadius:6, fontSize:11, color:"#fff" }} itemStyle={{ color:"#00d4ff" }} />
                  <Bar dataKey="value" radius={[4, 4, 0, 0]}>
                    {deptData.map((entry, index) => <Cell key={index} fill={DEPT_COLORS[entry.name] || "#00d4ff"} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          <div style={{ background: "#131528", border: "1px solid #1f2244", borderRadius: 12, padding: 24 }}>
            <h3 style={{ fontSize: 12, fontWeight: 800, color: "#fff", marginBottom: 20, letterSpacing: "0.05em" }}>INVESTIMENTO DE TEMPO</h3>
            <div style={{ width: "100%", height: 260, display: "flex", alignItems: "center" }}>
              <div style={{ width: "60%", height: "100%" }}>
                <ResponsiveContainer>
                  <PieChart>
                    <Pie data={typeData} innerRadius={65} outerRadius={85} paddingAngle={5} dataKey="value">
                      {typeData.map((entry, index) => <Cell key={index} fill={TYPE_COLORS[entry.name] || "#00d4ff"} />)}
                    </Pie>
                    <Tooltip contentStyle={{ background:"#1c1e36", border:"1px solid #2d3154", borderRadius:6, fontSize:11, color:"#fff" }} itemStyle={{ color:"#00d4ff" }} />
                  </PieChart>
                </ResponsiveContainer>
              </div>
              <div style={{ width: "40%", display: "flex", flexDirection: "column", gap: 12 }}>
                {typeData.map((entry, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: TYPE_COLORS[entry.name] }}></div>
                    <div>
                      <p style={{ fontSize: 11, color: "#fff", fontWeight: 700 }}>{entry.name}</p>
                      <p style={{ fontSize: 10, color: "#64748b" }}>{entry.value} Horas</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div style={{ background: "#131528", border: "1px solid #1f2244", borderRadius: 12, padding: 24 }}>
          <h3 style={{ fontSize: 12, fontWeight: 800, color: "#fff", marginBottom: 16, letterSpacing: "0.05em" }}>🏆 TOP 4 INSTRUTORES</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 16 }}>
            {topInstructors.length > 0 ? topInstructors.map((ins, idx) => {
              const colors = ["#00d4ff", "#d946ef", "#8b5cf6", "#3b82f6"];
              return (
                <div key={idx} style={{ background: "#1a1d36", borderRadius: 10, padding: 16, borderLeft: `4px solid ${colors[idx]}` }}>
                  <p style={{ fontSize: 12, fontWeight: 800, color: "#fff" }}>{idx+1}º {ins.name}</p>
                  <p style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>Ações aplicadas: <span style={{ color: colors[idx], fontWeight: 800 }}>{ins.count}</span></p>
                </div>
              );
            }) : <p style={{ fontSize:11, color:"#475569" }}>Nenhum dado computado.</p>}
          </div>
        </div>

        <div style={{ background: "#131528", border: "1px solid #1f2244", borderRadius: 12, overflow: "hidden" }}>
          <div style={{ padding: "20px 24px", borderBottom: "1px solid #1f2244" }}>
            <h3 style={{ fontSize: 12, fontWeight: 800, color: "#fff", letterSpacing: "0.05em" }}>ÚLTIMOS GARGALOS</h3>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: 11 }}>
              <thead style={{ background: "#1a1d36", color: "#64748b" }}>
                <tr>
                  {["DATA", "COLABORADOR", "DEPARTAMENTO", "AÇÃO", "DURAÇÃO", "STATUS"].map(h => (
                    <th key={h} style={{ padding: "14px 20px", fontWeight: 700 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((row, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid #1f2244", background: i % 2 === 0 ? "transparent" : "#16182e" }}>
                    <td style={{ padding: "14px 20px", color: "#94a3b8" }}>{row.date}</td>
                    <td style={{ padding: "14px 20px", fontWeight: 700, color: "#fff" }}>{row.collaborator}</td>
                    <td style={{ padding: "14px 20px", color: DEPT_COLORS[row.department] || "#fff" }}>{row.department}</td>
                    <td style={{ padding: "14px 20px", color: "#cbd5e1", maxWidth: 300, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }} title={row.action}>{row.action}</td>
                    <td style={{ padding: "14px 20px", fontWeight: 700, color: "#fff" }}>{row.duration}h</td>
                    <td style={{ padding: "14px 20px" }}><StatusBadge status={row.status} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TecklabDashboard />);
</script>
</body>
</html>
