    <div id="teamTab">
        <div class="grid-kpi">
            <div class="kpi"><div class="label">Banco de horas total da equipe</div><div id="totalHours" class="value">--</div></div>
            <div class="kpi"><div class="label">Eficiência Técnica</div><div id="teamEff" class="value">--</div></div>
            <div class="kpi"><div class="label">Pendências Recentes</div><div id="activeTasks" class="value">--</div></div>
            <div class="kpi"><div class="label">Registros Hoje</div><div id="todayTasks" class="value">--</div></div>
        </div>
        <div class="card">
            <h3>Últimas Atividades da Equipe</h3>
            <div class="table-wrap" id="teamTable">Carregando dados...</div>
        </div>
    </div>

    <div id="indivTab" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>Histórico Individual</h3>
                <select id="techFilter" onchange="render()" style="padding:8px; border-radius:8px; background:#0f172a; color:white; border:1px solid var(--purple);"></select>
            </div>
            <div class="table-wrap" id="indivTable"></div>
        </div>
    </div>
    <div id="statusBar" style="font-size:0.7rem; color:var(--muted); margin-top:10px;">Aguardando sincronização...</div>
</div>

<script>
    // URL DE EXPORTAÇÃO CSV (A que funciona no seu primeiro código)
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1ojqDletct5yLCPXzFtIFvBEndLwRfK318UMKBeSPBBs/gviz/tq?tqx=out:csv&sheet=Dados";
    
    let rawData = [];

    // Função para processar o texto do CSV
    function parseCSV(text) {
        const rows = [];
        let row = [], cur = '', q = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i], n = text[i+1];
            if (c === '"') { if (q && n === '"') { cur += '"'; i++; } else q = !q; }
            else if (c === ',' && !q) { row.push(cur); cur = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (c === '\r' && n === '\n') i++;
                row.push(cur); rows.push(row); row = []; cur = '';
            } else cur += c;
        }
        if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
        return rows;
    }

    async function loadData() {
        document.getElementById('statusBar').innerText = "Sincronizando com a nuvem...";
        try {
            const response = await fetch(SHEET_CSV_URL + "&cb=" + Date.now());
            const text = await response.text();
            const rows = parseCSV(text);
            const headers = rows[0].map(h => h.trim());
            
            rawData = rows.slice(1).map(r => {
                let obj = {};
                headers.forEach((h, i) => obj[h] = r[i] ? r[i].trim() : "");
                return obj;
            }).filter(r => r.Colaborador);

            initFilters();
            render();
            document.getElementById('statusBar').innerText = "Última atualização: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('statusBar').innerText = "Erro ao ler a planilha. Verifique a internet.";
            console.error(e);
        }
    }

    function initFilters() {
        const techs = [...new Set(rawData.map(r => r.Colaborador))].sort();
        const filter = document.getElementById('techFilter');
        const current = filter.value;
        filter.innerHTML = techs.map(t => `<option value="${t}">${t}</option>`).join('');
        if(current) filter.value = current;
    }

    function render() {
        // KPI - Eficiência
        const total = rawData.length;
        const concl = rawData.filter(r => r.Status === 'Concluído').length;
        document.getElementById('teamEff').innerText = total ? Math.round((concl/total)*100) + "%" : "--";
        document.getElementById('totalHours').innerText = total; // Contagem simples de registros
        document.getElementById('activeTasks').innerText = rawData.filter(r => r.Status !== 'Concluído').length;

        // Tabela Equipe
        const teamHtml = `<table><thead><tr><th>Técnico</th><th>Data</th><th>Ação</th><th>Status</th></tr></thead><tbody>` + 
            rawData.slice(0, 15).map(r => `<tr>
                <td>${r.Colaborador}</td>
                <td class="col-date">${r.Data}</td>
                <td>${r.Ação}</td>
                <td><span style="color:${r.Status === 'Concluído' ? '#4ade80' : '#f87171'}">${r.Status}</span></td>
            </tr>`).join('') + `</tbody></table>`;
        document.getElementById('teamTable').innerHTML = teamHtml;

        // Tabela Individual
        const selectedTech = document.getElementById('techFilter').value;
        const techData = rawData.filter(r => r.Colaborador === selectedTech);
        const indivHtml = `<table><thead><tr><th>Data</th><th>Duração</th><th>Ação</th><th>Anotações</th></tr></thead><tbody>` + 
            techData.map(r => `<tr>
                <td class="col-date">${r.Data}</td>
                <td>${r.Duração}</td>
                <td>${r.Ação}</td>
                <td>${r.Anotações}</td>
            </tr>`).join('') + `</tbody></table>`;
        document.getElementById('indivTable').innerHTML = indivHtml;
    }

    function switchTab(tab) {
        document.getElementById('teamTab').classList.toggle('hidden', tab !== 'team');
        document.getElementById('indivTab').classList.toggle('hidden', tab !== 'indiv');
    }

    // Início automático
    loadData();
</script>
